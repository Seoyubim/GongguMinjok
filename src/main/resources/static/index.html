<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공구의 민족 - 동네 이웃 간 공동구매 플랫폼</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">
          <img src="images/logo.jpg" alt="공구의 민족 로고" class="logo-image">
          <h1 class="logo-text">공구의 민족</h1>
        </a>

        <div class="header-actions">
          <a href="write.html" class="btn btn-primary">공구 만들기</a>
          <a href="login.html" id="loginBtn" class="btn btn-outline">로그인</a>
          <a href="mypage.html" id="mypageBtn" class="btn btn-outline hidden">마이페이지</a>
          <button id="logoutBtn" class="btn btn-outline hidden" type="button">로그아웃</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="map-section">
      <div class="map-container">
        <div class="map-fallback">
          <div class="map-grid"></div>

          <div class="map-overlay">
            <p id="mapTitle" class="map-title"></p>
            <p id="mapSubTitle" class="map-subtitle"></p>
          </div>

          <div id="mapMarkers"></div>

          <button class="btn btn-outline btn-sm location-btn" type="button">내 위치</button>
        </div>
      </div>
    </div>

    <div class="list-section">
      <div class="section-header">
        <h2 class="section-title">내 주변 공동구매</h2>
        <p id="groupCount" class="section-count"></p>
      </div>

      <div id="categoryFilter" class="category-filter"></div>

      <div class="tabs">
        <div class="tabs-list">
          <button class="tab-trigger active" data-status="all" type="button">전체</button>
          <button class="tab-trigger" data-status="recruiting" type="button">모집중</button>
          <button class="tab-trigger" data-status="closing" type="button">마감임박</button>
        </div>

        <div class="tab-content active">
          <div id="groupbuyGrid" class="groupbuy-grid"></div>

          <div id="loadMoreWrap" class="load-more-wrap hidden">
            <button id="loadMoreBtn" class="load-more-btn" type="button">더보기</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="js/mock/data.js"></script>
  <script src="js/api/groupBuyApi.js"></script>
  <script src="js/utils/storage.js"></script>
  <script src="js/utils/format.js"></script>
  <script src="js/pages/index.js"></script>

</body>
</html>
