<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공구의 민족 - 동네 이웃 간 공동구매 플랫폼</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">
          <img src="images/logo.jpg" alt="공구의 민족 로고" class="logo-image">
          <h1 class="logo-text">공구의 민족</h1>
        </a>

        <div class="header-actions">
          <a href="write.html" id="writeBtn" class="btn btn-primary hidden">공구 만들기</a>
          <a href="login.html" id="loginBtn" class="btn btn-outline">로그인</a>
          <a href="mypage.html" id="mypageBtn" class="btn btn-outline hidden">마이페이지</a>
          <button id="logoutBtn" class="btn btn-outline hidden" type="button">로그아웃</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="search-section">
      <h2 class="search-title">이웃과 함께, 더 저렴하게 🌿</h2>
      <p class="search-subtitle">동네 이웃과 공동구매하고 배송비·가격 모두 절약하세요</p>
      <div class="search-box">
        <input type="text" placeholder="상품명 또는 키워드 검색">
        <button type="button">검색</button>
      </div>
    </div>

    <div class="map-section">
      <div class="map-container">
        <div class="map-fallback">
          <div class="map-grid"></div>
          <div id="map" class="kakao-map"></div>
          <div class="map-overlay">
            <p id="mapTitle" class="map-title">내 주변 공동구매</p>
            <p id="mapSubTitle" class="map-subtitle"></p>
          </div>
          <button id="mainLocationBtn" class="btn btn-outline btn-sm location-btn" type="button">
            내 위치
          </button>
        </div>
      </div>
    </div>

    <div class="list-section">
      <div class="section-header">
        <h2 class="section-title">내 주변 공동구매</h2>
        <p id="groupCount" class="section-count"></p>
      </div>

      <div id="categoryFilter" class="category-filter">
        <div class="category-checkbox-wrapper">

          <label class="category-checkbox">
            <input type="checkbox" value="ELECTRONICS">
            <span>전자제품</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="HOME_APPLIANCES">
            <span>가전제품</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="FURNITURE_INTERIOR">
            <span>가구/인테리어</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="HOME_KITCHEN">
            <span>생활/주방용품</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="BABY_KIDS">
            <span>유아/아동</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="WOMENS_CLOTHING">
            <span>여성의류</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="WOMENS_ACCESSORIES">
            <span>여성잡화</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="MENS_FASHION_ACCESSORIES">
            <span>남성패션/잡화</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="BEAUTY_PERSONAL_CARE">
            <span>뷰티/개인관리</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="SPORTS_LEISURE">
            <span>스포츠/레저</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="HOBBIES_GAMES_MUSIC">
            <span>취미/게임/음악</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="BOOKS">
            <span>도서</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="TICKETS_VOUCHERS">
            <span>티켓/상품권</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="E_COUPONS">
            <span>전자쿠폰</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="PROCESSED_FOODS">
            <span>가공식품</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="HEALTH_SUPPLEMENTS">
            <span>건강식품/영양제</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="PET_SUPPLIES">
            <span>반려동물용품</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="PLANTS">
            <span>식물</span>
          </label>

          <label class="category-checkbox">
            <input type="checkbox" value="OTHERS">
            <span>기타</span>
          </label>

        </div>
      </div>

      <div class="tabs">
        <div class="tabs-list">
          <button class="tab-trigger active" data-status="all" type="button">전체</button>
          <button class="tab-trigger" data-status="recruiting" type="button">모집중</button>
          <button class="tab-trigger" data-status="closing" type="button">마감임박</button>
        </div>

        <div class="tab-content active">
          <div id="groupbuyGrid" class="groupbuy-grid"></div>

          <div id="loadMoreWrap" class="load-more-wrap hidden">
            <button id="loadMoreBtn" class="load-more-btn" type="button">더보기</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <div id="mapModal" class="map-modal hidden">
    <div class="map-modal-content">
      <button id="closeMapModalBtn" class="map-modal-close" type="button" aria-label="지도 닫기">×</button>

      <button id="modalLocationBtn" class="btn btn-outline btn-sm location-btn modal-location-btn" type="button">
        내 위치
      </button>

      <div id="modalMap" class="modal-map"></div>
    </div>
  </div>

  <script src="js/api/groupBuyApi.js"></script>
  <script src="js/utils/ui.js"></script>
  <script src="js/utils/storage.js"></script>
  <script src="js/utils/format.js"></script>

  <script
    type="text/javascript"
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4e2629de2f371f4282d3552c56fed7ef&libraries=services&autoload=false"
    onload="window.kakaoSdkReady = true;"
    onerror="console.error('카카오맵 SDK 스크립트 로드 실패');"
  ></script>
  <script type="module" src="js/pages/index.js"></script>
</body>
</html>
