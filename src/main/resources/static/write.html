<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공동구매 만들기 - 공구의 민족</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/write.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">
          <img src="images/logo.jpg" alt="공구의 민족 로고" class="logo-image">
          <h1 class="logo-text">공구의 민족</h1>
        </a>
        <div class="header-actions">
          <a href="mypage.html" class="btn btn-outline">마이페이지</a>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="create-page">
      <a href="index.html" class="btn btn-outline btn-sm back-link">← 뒤로가기</a>

      <h1 class="page-title">공동구매 만들기</h1>
      <p class="page-subtitle">이웃과 함께 똑똑한 소비를 시작해보세요</p>

      <div class="steps">
        <div class="step-circle active">1</div>
        <div class="step-line"></div>
        <div class="step-circle">2</div>
        <div class="step-line"></div>
        <div class="step-circle">3</div>
      </div>

      <div class="step-labels">
        <span>기본 정보</span>
        <span>픽업 정보</span>
        <span>확인</span>
      </div>

      <div class="step-content active" id="step-1">
        <div class="card">
          <div class="card-header">기본 정보</div>

          <form id="createForm">
            <div class="form-group">
              <label class="form-label" for="title">제목 *</label>
              <input id="title" type="text" class="form-input" placeholder="예: 제주 한라봉 5kg 공동구매">
            </div>

            <div class="form-group">
              <label class="form-label" for="category">카테고리 *</label>
              <select id="category" class="form-select">
                <option value="">카테고리 선택</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="price">인당 가격 *</label>
              <input id="price" type="number" class="form-input" placeholder="20000">
            </div>

            <div class="form-group">
              <label class="form-label" for="maxParticipants">최대 참여 인원 *</label>
              <input id="maxParticipants" type="number" class="form-input" placeholder="5">
              <p class="form-hint">💡 참여자가 많을수록 진행자 할인 혜택이 커져요!</p>
            </div>

            <div class="form-group">
              <label class="form-label" for="productLink">상품 링크</label>
              <input id="productLink" type="text" class="form-input" placeholder="https://example.com/product">
            </div>

            <div class="form-group">
              <label class="form-label" for="description">설명</label>
              <textarea id="description" class="form-textarea" placeholder="상품에 대한 설명을 자유롭게 작성해주세요"></textarea>
            </div>

            <button type="button" class="btn btn-primary btn-full" onclick="goToStep(2)">다음 단계</button>
          </form>
        </div>
      </div>

      <div class="step-content" id="step-2">
        <div class="card">
          <div class="card-header">픽업 장소</div>
          <div class="form-group">
            <input id="pickupLocation" type="text" class="form-input" placeholder="예: 성수역 2번 출구 카페">
          </div>
          <div class="map-placeholder">📍 지도에서 위치 선택</div>
        </div>

        <div class="card">
          <div class="card-header">픽업 시간대</div>
          <div id="pickup-times-container">
            <input type="text" class="form-input pickup-time" placeholder="예: 오늘 18:00-19:00">
          </div>
          <button class="btn btn-outline" onclick="addPickupTime()">+ 시간대 추가</button>
        </div>

        <div class="button-group">
          <button class="btn btn-outline" onclick="goToStep(1)">이전</button>
          <button class="btn btn-primary" onclick="goToStep(3)">다음 단계</button>
        </div>
      </div>

      <div class="step-content" id="step-3">
        <div class="card">
          <div class="card-header">확인</div>

          <div class="confirm-item">
            <label>제목</label>
            <p id="confirm-title"></p>
          </div>

          <div class="confirm-item">
            <label>카테고리</label>
            <p id="confirm-category"></p>
          </div>

          <div class="confirm-item">
            <label>가격</label>
            <p id="confirm-price"></p>
          </div>

          <div class="confirm-item">
            <label>최대 참여 인원</label>
            <p id="confirm-participants"></p>
          </div>

          <div class="confirm-item">
            <label>픽업 장소</label>
            <p id="confirm-location"></p>
          </div>

          <div class="confirm-item">
            <label>픽업 시간대</label>
            <ul id="confirm-times"></ul>
          </div>

          <div class="confirm-item">
            <label>설명</label>
            <p id="confirm-description"></p>
          </div>
        </div>

        <div class="button-group">
          <button class="btn btn-outline" onclick="goToStep(2)">이전</button>
          <button class="btn btn-primary" onclick="submitForm()">공동구매 생성</button>
        </div>
      </div>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/write.js"></script>
</body>
</html>
