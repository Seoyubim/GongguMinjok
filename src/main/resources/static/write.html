<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공동구매 만들기 - 공구의 민족</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/write.css">
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-content">
      <a href="index.html" class="logo">
        <img src="images/logo.jpg" alt="공구의 민족 로고" class="logo-image">
        <h1 class="logo-text">공구의 민족</h1>
      </a>
      <div class="header-actions">
        <a href="mypage.html" class="btn btn-outline">마이페이지</a>
      </div>
    </div>
  </div>
</header>

<main class="main-content">
  <div class="page" id="pg-create">

    <nav class="tnav">
      <button class="tnav-back" onclick="go('list')">←</button>
      <span class="tnav-title">공동구매 만들기</span>
      <button class="tnav-icon" style="font-size:13px;font-weight:600;color:var(--gp)" onclick="saveDraft()">임시저장</button>
    </nav>

    <div class="step-bar">
      <div class="step-track" id="cr-step-track">
        <div class="step-item active" id="cr-si-1">
          <div class="step-circle">1</div>
          <span class="step-lbl">기본정보</span>
        </div>
        <div class="step-item pending" id="cr-si-2">
          <div class="step-circle">2</div>
          <span class="step-lbl">구매설정</span>
        </div>
        <div class="step-item pending" id="cr-si-3">
          <div class="step-circle">3</div>
          <span class="step-lbl">픽업설정</span>
        </div>
        <div class="step-item pending" id="cr-si-4">
          <div class="step-circle">4</div>
          <span class="step-lbl">미리보기</span>
        </div>
      </div>
    </div>

    <div class="step-cont active" id="cr-s1">
      <div class="sec">
        <div style="font-size:14px;font-weight:700;margin-bottom:13px">
          🛒 구매 유형 <span style="color:var(--red)">*</span>
        </div>
        <div class="type-grid">
          <div class="type-card" onclick="crType(this,'online')">
            <div class="tc-icon">🛒</div>
            <div class="tc-lbl">온라인 마켓</div>
            <div class="tc-desc">쿠팡·네이버 링크 공유</div>
          </div>
          <div class="type-card" onclick="crType(this,'farm')">
            <div class="tc-icon">🌾</div>
            <div class="tc-lbl">산지 직배송</div>
            <div class="tc-desc">농·수산물 대량구매</div>
          </div>
        </div>
        <div class="err-msg" id="cr-type-err">구매 유형을 선택해 주세요.</div>
      </div>

      <div class="sec">
        <div style="font-size:14px;font-weight:700;margin-bottom:13px">📝 게시글 정보</div>

        <div class="fgroup">
          <label class="flabel">제목 <span class="req">*</span></label>
          <input class="finput" id="cr-title" maxlength="40" placeholder="예) 코스트코 세제 소분 나눔" oninput="ccnt('cr-title','cr-tc',40)">
          <div class="char-cnt"><span id="cr-tc">0</span>/40</div>
          <div class="err-msg" id="cr-title-err">제목을 입력해 주세요. (5자 이상)</div>
        </div>

        <div class="fgroup">
          <label class="flabel">상세 설명 <span class="req">*</span></label>
          <textarea class="ftarea" id="cr-desc" maxlength="500" placeholder="상품 정보, 소분 방식 등 자세히 적어주세요" oninput="ccnt('cr-desc','cr-dc',500)"></textarea>
          <div class="char-cnt"><span id="cr-dc">0</span>/500</div>
          <div class="err-msg" id="cr-desc-err">설명을 입력해 주세요. (10자 이상)</div>
        </div>

        <div class="fgroup" id="cr-link-group" style="display:none">
          <label class="flabel">상품 링크</label>
          <input class="finput" id="cr-link" type="url" placeholder="https://...">
        </div>
      </div>
    </div>

    <div class="step-cont" id="cr-s2">
      <div class="sec">
        <div style="font-size:14px;font-weight:700;margin-bottom:13px">👥 모집 인원</div>
        <div class="fgroup">
          <label class="flabel">최대 모집 인원 <span class="req">*</span></label>
          <div class="stepper">
            <button onclick="stepV('cr-head',-1,2,20)">−</button>
            <input type="number" id="cr-head" value="4" min="2" max="20" oninput="calcPrice()">
            <button onclick="stepV('cr-head',1,2,20)">＋</button>
          </div>
        </div>
      </div>

      <div class="sec">
        <div style="font-size:14px;font-weight:700;margin-bottom:13px">💰 금액 설정</div>
        <input class="finput" id="cr-total" type="number" placeholder="총 금액" oninput="calcPrice()">
        <input class="finput" id="cr-disc" type="number" value="0" oninput="calcPrice()">
        <div id="cr-pp">계산 중...</div>
      </div>

      <div class="sec">
        <div style="font-size:14px;font-weight:700;margin-bottom:13px">💳 정산 방법</div>
        <select id="cr-pay" class="finput">
          <option value="">선택</option>
          <option value="cash">현금</option>
          <option value="transfer">계좌이체</option>
          <option value="kakao">카카오페이</option>
          <option value="toss">토스</option>
        </select>
      </div>
    </div>

    <div class="step-cont" id="cr-s3">
      <div class="sec">
        <div style="font-size:14px;font-weight:700;margin-bottom:13px">📍 픽업 장소</div>
        <input id="cr-addr" class="finput" placeholder="주소 입력">
      </div>

      <div class="sec">
        <div style="font-size:14px;font-weight:700;margin-bottom:13px">📅 픽업 날짜</div>
        <input id="cr-pdate" type="date" class="finput">
      </div>
    </div>

    <div class="step-cont" id="cr-s4">
      <h3>미리보기</h3>
      <p id="preview"></p>
    </div>

    <div class="bot-cta">
      <button id="cr-prev-btn" class="btn-prev-step" onclick="crPrev()" style="display:none">← 이전</button>
      <button id="cr-next-btn" class="btn-next-step" onclick="crNext()">다음 단계 →</button>
    </div>

  </div>
</main>

</body>
</html>
